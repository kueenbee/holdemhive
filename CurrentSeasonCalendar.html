<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kueen$Bees Hold Em Hive — Season 14 Schedule</title>

  <style>
    :root{
      --bg:#0b0b0d;
      --card:#141419;
      --text:#f4f4f6;
      --muted:#b9b9c2;
      --grid:#2a2a33;

      --hive:#ffd400;     /* yellow */
      --online:#38d36f;   /* green  */
      --guest:#ff9a3c;    /* orange */

      --shadow: 0 8px 22px rgba(0,0,0,.35);
      --radius: 14px;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body{
      margin:0;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(255,212,0,.10), transparent 60%),
                  radial-gradient(1000px 600px at 90% 0%, rgba(56,211,111,.08), transparent 55%),
                  var(--bg);
      color:var(--text);
      font-family:var(--font);
    }

    .wrap{ max-width: 1100px; margin: 0 auto; padding: 22px 14px 50px; }

    .sub{ color:var(--muted); font-size:.95rem; }

    .legend{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      padding: 10px 12px; border-radius: 999px;
    }
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px; border-radius:999px;
      font-size: .92rem; color: var(--text);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      user-select:none;
    }
    .dot{ width:10px; height:10px; border-radius:50%; }
    .dot.hive{ background: var(--hive); }
    .dot.online{ background: var(--online); }
    .dot.guest{ background: var(--guest); }

    .months{ display:grid; gap: 16px; margin-top: 14px; }
    .month{
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .month-head{
      padding: 12px 14px;
      display:flex; justify-content:space-between; align-items:center; gap: 10px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .month-title{ font-weight: 650; }
    .month-note{ color: var(--muted); font-size:.92rem; }

    .dow{
      display:grid; grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid rgba(255,255,255,.07);
      background: rgba(0,0,0,.12);
    }
    .dow div{
      padding: 10px 8px;
      text-align:center;
      font-size: .85rem;
      color: var(--muted);
      letter-spacing:.3px;
    }

    .grid{
      display:grid; grid-template-columns: repeat(7, 1fr);
    }
    .day{
      min-height: 92px;
      border-right: 1px solid rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 8px;
      position: relative;
      background: rgba(0,0,0,.06);
    }
    .day:nth-child(7n){ border-right: none; } /* last column */
    .day.off{ background: rgba(0,0,0,.02); color: rgba(255,255,255,.35); }
    .num{ font-size:.9rem; color: var(--muted); }

    .event{
      margin-top: 8px;
      border-radius: 10px;
      padding: 8px 9px;
      font-size: .9rem;
      line-height: 1.1rem;
      color: #101014;
      font-weight: 650;
      display:flex; flex-direction:column; gap:4px;
      box-shadow: 0 8px 18px rgba(0,0,0,.25);
    }
    .event small{
      font-weight:600;
      opacity:.85;
    }

    .event.hive{ background: linear-gradient(180deg, rgba(255,212,0,1), rgba(255,212,0,.82)); }
    .event.online{ background: linear-gradient(180deg, rgba(56,211,111,1), rgba(56,211,111,.82)); }
    .event.guest{ background: linear-gradient(180deg, rgba(255,154,60,1), rgba(255,154,60,.85)); }

    /* Badge for non-Thursday (Tue games, etc.) */
    .badge{
      align-self:flex-start;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(0,0,0,.22);
      color: #0b0b0d;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: .72rem;
      letter-spacing:.3px;
    }

    /* Header layout */
    header.topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 280px;
    }
    .brand img{
      height:70px; /* adjust: 60px smaller, 85px bigger */
      width:auto;
      border-radius:8px;
    }
    .brand h1{
      margin:0;
      font-size:1.4rem;
      letter-spacing:.2px;
    }

    @media (max-width: 720px){
      .day{ min-height: 80px; padding: 7px; }
      .event{ font-size: .86rem; }
      .brand img{ height:60px; }
      .brand h1{ font-size:1.2rem; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!--
      Put your logo image file in the same folder as this HTML.
      Name it exactly: kueensbees-logo.png
      (Or change the src below to match your filename.)
    -->
    <header class="topbar">
      <div class="brand">
        <img src="images/Kueen$BeesPokerPatch.png" alt="Kueen$Bees Hold Em Hive Logo" />
        <div>
          <h1>Kueen$Bees Hold Em Hive — Season <span id="seasonNum">__</span> Schedule</h1>
          <div class="sub">Monthly calendar view (colors show venue type)</div>
        </div>
      </div>

      <div class="legend" aria-label="Legend">
        <span class="chip"><span class="dot hive"></span>Hive</span>
        <span class="chip"><span class="dot online"></span>Online</span>
        <span class="chip"><span class="dot guest"></span>Guest Host</span>
      </div>
    </header>

    <div class="months" id="months"></div>
  </div>

  <script>
    // ========= SEASON 14 CONFIG =========
    const seasonNumber = 14;

    // Events: date in YYYY-MM-DD, type: hive|online|guest
    // Assumption per your instructions: weekly Thursdays starting March 5, 2026,
    // 8 games total, all live at the Hive.
    const events = [
      { date: "2026-03-05", type: "hive", label: "Game 1", details: "Hive (Live)" },
      { date: "2026-03-12", type: "hive", label: "Game 2", details: "Hive (Live)" },
      { date: "2026-03-19", type: "hive", label: "Game 3", details: "Hive (Live)" },
      { date: "2026-03-26", type: "hive", label: "Game 4", details: "Hive (Live)" },
      { date: "2026-04-02", type: "hive", label: "Game 5", details: "Hive (Live)" },
      { date: "2026-04-09", type: "hive", label: "Game 6", details: "Hive (Live)" },
      { date: "2026-04-16", type: "hive", label: "Game 7", details: "Hive (Live)" },
      { date: "2026-04-23", type: "hive", label: "Game 8 👑", details: "Hive (Live) — Season Finale" }
    ];
    // ===================================

    document.getElementById("seasonNum").textContent = seasonNumber;

    const monthsEl = document.getElementById("months");
    const byMonth = new Map();

    for (const e of events){
      const d = new Date(e.date + "T12:00:00");
      const key = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
      if (!byMonth.has(key)) byMonth.set(key, []);
      byMonth.get(key).push(e);
    }

    // Sort months chronologically
    const monthKeys = [...byMonth.keys()].sort();

    const monthName = (y, m) =>
      new Date(y, m, 1).toLocaleString(undefined, { month:"long", year:"numeric" });

    for (const key of monthKeys){
      const [yy, mm] = key.split("-").map(Number);
      const first = new Date(yy, mm-1, 1);
      const last  = new Date(yy, mm, 0);
      const daysInMonth = last.getDate();

      // Sunday=0 ... Saturday=6
      const startDow = first.getDay();

      const month = document.createElement("section");
      month.className = "month";

      const head = document.createElement("div");
      head.className = "month-head";

      const title = document.createElement("div");
      title.className = "month-title";
      title.textContent = monthName(yy, mm-1);

      const note = document.createElement("div");
      note.className = "month-note";
      note.textContent = `${byMonth.get(key).length} game(s) this month`;

      head.appendChild(title);
      head.appendChild(note);

      const dow = document.createElement("div");
      dow.className = "dow";
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(x=>{
        const c=document.createElement("div");
        c.textContent=x;
        dow.appendChild(c);
      });

      const grid = document.createElement("div");
      grid.className = "grid";

      // Padding cells before the month starts
      for (let i=0; i<startDow; i++){
        const cell=document.createElement("div");
        cell.className="day off";
        grid.appendChild(cell);
      }

      // Day cells
      for (let day=1; day<=daysInMonth; day++){
        const cell=document.createElement("div");
        cell.className="day";

        const num=document.createElement("div");
        num.className="num";
        num.textContent=day;
        cell.appendChild(num);

        const iso = `${yy}-${String(mm).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const ev = byMonth.get(key).find(e => e.date === iso);

        if (ev){
          const eDiv=document.createElement("div");
          eDiv.className=`event ${ev.type}`;

          // Badge if not Thursday (Tue games, etc.) — keeps “exceptions” obvious.
          const dayOfWeek = new Date(ev.date + "T12:00:00").getDay(); // 0=Sun..6=Sat
          if (dayOfWeek !== 4){ // 4 = Thursday
            const b=document.createElement("span");
            b.className="badge";
            b.textContent = ["SUN","MON","TUE","WED","THU","FRI","SAT"][dayOfWeek];
            eDiv.appendChild(b);
          }

          const main=document.createElement("div");
          main.textContent = ev.label || "Game";
          eDiv.appendChild(main);

          if (ev.details){
            const sm=document.createElement("small");
            sm.textContent = ev.details;
            eDiv.appendChild(sm);
          }

          cell.appendChild(eDiv);
        }

        grid.appendChild(cell);
      }

      month.appendChild(head);
      month.appendChild(dow);
      month.appendChild(grid);
      monthsEl.appendChild(month);
    }

    if (events.length === 0){
      monthsEl.innerHTML = `
        <div class="month" style="padding:16px;">
          <div style="color:var(--muted);">
            Add your 8 games in the <code>events</code> list, upload this file, and link it in your emails.
          </div>
        </div>`;
    }
  </script>
</body>
</html>
