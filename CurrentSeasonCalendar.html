<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kueen$Bees Hold Em Hive — Season 14 Schedule</title>

  <style>
    :root{
      --bg:#0b0b0d;
      --text:#f4f4f6;
      --muted:#b9b9c2;
      --hive:#fdf03ff6;
      --online:#38d36f;
      --guest:#ff9a3c;
      --shadow: 0 8px 22px rgba(0,0,0,.35);
      --radius: 14px;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body{
      margin:0;
      background: var(--bg);
      color:var(--text);
      font-family:var(--font);
    }

    .wrap{ max-width: 1100px; margin: 0 auto; padding: 18px 14px 50px; }

    header.topbar{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-bottom:6px;
      flex-wrap:wrap;
      text-align:center;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      justify-content:center;
    }

    .brand img{
      height:70px;
      width:auto;
      border-radius:8px;
    }

    .brand h1{
      margin:0;
      font-size:1.4rem;
      color: var(--hive);
    }

    /* Plain blue underlined links centered under title */
    .pagelinks{
      text-align:center;
      margin: 8px 0 10px 0;
    }

    .pagelinks a{
      color: #1a5fd0;
      text-decoration: underline;
      font-weight: normal;
      margin: 0 12px;
    }

    /* Centered legend under links */
    .legend{
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom: 18px;
      font-size:.9rem;
    }

    .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; }
    .dot.hive{ background: var(--hive); }
    .dot.online{ background: var(--online); }
    .dot.guest{ background: var(--guest); }

    .months{ display:grid; gap: 16px; margin-top: 14px; }

    .month{
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .month-head{
      padding: 12px 14px;
      display:flex; justify-content:space-between; align-items:flex-start; gap: 12px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .month-title{ font-weight:650; }
    .month-note{ color: var(--muted); font-size:.92rem; }

    .month-meta{
      text-align:right;
      color: var(--muted);
      font-size: .92rem;
    }

    .dow, .grid{
      display:grid; grid-template-columns: repeat(7, 1fr);
    }

    .dow div{
      padding: 10px 8px;
      text-align:center;
      font-size: .85rem;
      color: var(--muted);
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .day{
      min-height: 92px;
      border-right: 1px solid rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 8px;
    }

    .day:nth-child(7n){ border-right:none; }

    .num{ font-size:.9rem; color: var(--muted); }

    .event{
      margin-top: 8px;
      border-radius: 10px;
      padding: 8px 9px;
      font-size: .9rem;
      color: #101014;
      font-weight: 650;
    }

    .event small{
      line-height: 1.15;
display:block;
      margin-top: 4px;
      font-weight: 700;
      opacity: .92;
}

    .event.hive{ background: var(--hive); }
    .event.online{ background: var(--online); }
    .event.guest{ background: var(--guest); }

  </style>
</head>

<body>
  <div class="wrap">

    <header class="topbar">
      <div class="brand">
        <img src="images/Kueen$BeesPokerPatch.png" alt="Kueen$Bees Hold Em Hive Logo" />
        <h1>Kueen$Bees Hold Em Hive — Season 14 Schedule</h1>
      </div>
    </header>

    <div class="pagelinks">
      <a href="index.html">Home</a>
      <a href="season-standings.html">Season Standings</a>
    </div>

    <div class="legend">
      <span><span class="dot hive"></span>Hive</span>
      <span><span class="dot online"></span>Online</span>
      <span><span class="dot guest"></span>Guest Host</span>
    </div>

    <div class="months" id="months"></div>
  </div>

<script>
const events = [
  { date: "2026-03-05", type: "hive", label: "G1", winner: "Kay C~~" },
  { date: "2026-03-12", type: "hive", label: "G2" },
  { date: "2026-03-19", type: "hive", label: "G3 Casino Night!" },
  { date: "2026-03-26", type: "hive", label: "G4" },
  { date: "2026-04-02", type: "hive", label: "G5" },
  { date: "2026-04-09", type: "hive", label: "G6" },
  { date: "2026-04-16", type: "hive", label: "G7 Casino Night!" },
  { date: "2026-04-23", type: "hive", label: "G8" },
  { date: "2026-04-30", type: "hive", label: "S14 Championship (TBD) 👑" }
];

function formatLastUpdated(){
  const lm = document.lastModified;
  const d = new Date(lm);
  if (isNaN(d.getTime())) return lm;
  return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"2-digit", hour:"numeric", minute:"2-digit" });
}

const monthsEl = document.getElementById("months");
const byMonth = new Map();

for (const e of events){
  const d = new Date(e.date + "T12:00:00");
  const key = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
  if (!byMonth.has(key)) byMonth.set(key, []);
  byMonth.get(key).push(e);
}

const monthKeys = [...byMonth.keys()].sort();

for (const key of monthKeys){
  const [yy, mm] = key.split("-").map(Number);
  const first = new Date(yy, mm-1, 1);
  const last  = new Date(yy, mm, 0);
  const daysInMonth = last.getDate();
  const startDow = first.getDay();

  const month = document.createElement("section");
  month.className = "month";

  const head = document.createElement("div");
  head.className = "month-head";

  const left = document.createElement("div");

  const title = document.createElement("div");
  title.className = "month-title";
  title.textContent = first.toLocaleString(undefined, { month:"long", year:"numeric" });

  const disclaimer = document.createElement("span");
  disclaimer.textContent = " (Schedule subject to change — refer to this page for updates.)";
  disclaimer.style.color = "#e03b3b";
  disclaimer.style.fontSize = "0.9rem";

  title.appendChild(disclaimer);

  const note = document.createElement("div");
  note.className = "month-note";
  note.textContent = `${byMonth.get(key).length} game(s) this month`;

  left.appendChild(title);
  left.appendChild(note);

  const meta = document.createElement("div");
  meta.className = "month-meta";
  meta.innerHTML = `<div>Last updated: ${formatLastUpdated()}</div>`;

  head.appendChild(left);
  head.appendChild(meta);

  month.appendChild(head);

  const dow = document.createElement("div");
  dow.className = "dow";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(x=>{
    const c=document.createElement("div");
    c.textContent=x;
    dow.appendChild(c);
  });
  month.appendChild(dow);

  const grid = document.createElement("div");
  grid.className = "grid";

  for (let i=0; i<startDow; i++){
    const cell=document.createElement("div");
    cell.className="day";
    grid.appendChild(cell);
  }

  for (let day=1; day<=daysInMonth; day++){
    const cell=document.createElement("div");
    cell.className="day";

    const num=document.createElement("div");
    num.className="num";
    num.textContent=day;
    cell.appendChild(num);

    const iso = `${yy}-${String(mm).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const ev = byMonth.get(key).find(e => e.date === iso);

    if (ev){
      const eDiv=document.createElement("div");
      eDiv.className=`event ${ev.type}`;

      const main = document.createElement("div");
      main.textContent = ev.label;
      eDiv.appendChild(main);

      if (ev.winner){
        const win = document.createElement("small");

        // Stack ring above the winner name
        win.style.display = "flex";
        win.style.flexDirection = "column";
        win.style.alignItems = "center";
        win.style.gap = "2px";
        win.style.lineHeight = "1.15";

        const ringImg = document.createElement("img");
        ringImg.src = "images/GRingEmoji-Hive.png";
        ringImg.alt = "Game Champion Ring";
        ringImg.style.height = "54px";
        ringImg.style.width = "auto";
        ringImg.style.display = "block";
        ringImg.style.marginBottom = "2px";

        win.appendChild(ringImg);

        const text = document.createTextNode(ev.winner);
        win.appendChild(text);

        eDiv.appendChild(win);

        // Completed games slightly less opaque
        eDiv.style.opacity = "0.9";
      }

      cell.appendChild(eDiv);
    }

    grid.appendChild(cell);
  }

  month.appendChild(grid);
  monthsEl.appendChild(month);
}
</script>

</body>
</html>
